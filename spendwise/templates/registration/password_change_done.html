{% extends 'base.html' %}
{% block title %}Password Changed{% endblock %}
{% block page_title %}Password Changed{% endblock %}

{% block content %}
<div style="max-width:400px;margin:60px auto;text-align:center;animation:slideUp 0.4s ease;">
  <div class="card">
    <div style="width:64px;height:64px;border-radius:50%;background:rgba(16,185,129,0.1);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:26px;color:var(--green);">
      <i class="fas fa-check-circle"></i>
    </div>
    <h2 style="font-size:20px;font-weight:800;margin-bottom:8px;">Password Updated!</h2>
    <p style="color:var(--text-muted);margin-bottom:20px;">Your password has been changed successfully.</p>
    <a href="{% url 'profile' %}" class="btn btn-primary" style="justify-content:center;"><i class="fas fa-user"></i> Back to Profile</a>
  </div>
</div>
{% endblock %}
